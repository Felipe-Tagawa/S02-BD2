version: '3.8'

services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra-rpg
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=RPGCluster
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=RACK1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  cassandra-data:
